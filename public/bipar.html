<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bipar Etiquetas — Monitor ML</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #2b2e33; --bg2: #353940; --border: #424650; --border2: #525762;
    --text: #d8d8d8; --text2: #9ea2a8; --text3: #767a82; --white: #ffffff;
    --blue: #6b9eff; --orange: #ffc72c; --green: #4ed170; --red: #ff5d52; --yellow: #ffd966;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  header { padding: 14px 28px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #ffc72c, #f5a800); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 700; color: #2b2e33; border: 2px solid #2b2e33; }
  h1 { font-size: 1rem; font-weight: 600; color: var(--white); }
  .sub { font-size: 0.72rem; color: var(--text3); margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .btn { background: var(--bg2); border: 1px solid var(--border2); color: var(--text); padding: 6px 14px; border-radius: 7px; cursor: pointer; font-size: 0.78rem; transition: background .15s, border-color .15s; display: inline-flex; align-items: center; gap: 5px; text-decoration: none; }
  .btn:hover { background: var(--border2); border-color: #484f58; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: rgba(88,166,255,.15); border-color: rgba(88,166,255,.4); color: var(--blue); font-weight: 600; }
  .btn-danger { background: rgba(248,81,73,.1); border-color: rgba(248,81,73,.3); color: var(--red); }

  .badge-inbound { font-size: 0.78rem; color: var(--orange); background: rgba(240,136,62,.1); border: 1px solid rgba(240,136,62,.3); padding: 4px 10px; border-radius: 20px; font-weight: 600; }

  .container { max-width: 1300px; margin: 0 auto; padding: 24px 28px; }

  /* ── Upload state ── */
  .upload-area {
    background: var(--bg2); border: 2px dashed var(--border2);
    border-radius: 14px; padding: 60px 32px; text-align: center;
    transition: border-color .15s, background .15s;
  }
  .upload-area.drag { border-color: var(--blue); background: rgba(88,166,255,.05); }
  .upload-icon { font-size: 3rem; margin-bottom: 12px; opacity: .6; }
  .upload-title { font-size: 1.1rem; font-weight: 600; color: var(--white); margin-bottom: 6px; }
  .upload-sub { font-size: 0.85rem; color: var(--text2); margin-bottom: 20px; }
  .upload-input { display: none; }

  /* ── Working state ── */
  .grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

  .scan-area { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 28px; }
  .scan-label { font-size: 0.72rem; color: var(--text2); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
  .scan-input {
    width: 100%; background: var(--bg); border: 2px solid var(--border2);
    color: var(--white); padding: 18px 22px; border-radius: 10px;
    font-family: 'Cascadia Code','Consolas',monospace; font-size: 1.4rem; font-weight: 600;
    outline: none; transition: border-color .15s; letter-spacing: 2px;
  }
  .scan-input:focus { border-color: var(--blue); box-shadow: 0 0 0 4px rgba(88,166,255,.15); }
  .scan-input.success { border-color: var(--green); box-shadow: 0 0 0 4px rgba(63,185,80,.2); }
  .scan-input.error { border-color: var(--red); box-shadow: 0 0 0 4px rgba(248,81,73,.2); }

  .config-row { display: flex; gap: 16px; margin-top: 16px; align-items: center; flex-wrap: wrap; }
  .config-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
  .qty-input { width: 60px; background: var(--bg); border: 1px solid var(--border2); color: var(--white); padding: 6px 10px; border-radius: 7px; font-size: 0.95rem; text-align: center; outline: none; font-weight: 600; }
  .qty-input:focus { border-color: var(--blue); }

  .feedback { margin-top: 22px; padding: 20px; border-radius: 10px; min-height: 90px; display: flex; align-items: center; justify-content: center; text-align: center; transition: all .2s; }
  .feedback.idle { background: rgba(110,118,129,.05); border: 1px dashed var(--border2); color: var(--text3); font-size: 0.85rem; }
  .feedback.success { background: rgba(63,185,80,.1); border: 1px solid rgba(63,185,80,.3); }
  .feedback.error { background: rgba(248,81,73,.1); border: 1px solid rgba(248,81,73,.3); }
  .feedback.loading { background: rgba(88,166,255,.08); border: 1px solid rgba(88,166,255,.25); color: var(--blue); }
  .fb-content { width: 100%; }
  .fb-icon { font-size: 2rem; margin-bottom: 6px; }
  .fb-title { font-size: 1.1rem; font-weight: 700; color: var(--white); margin-bottom: 4px; }
  .fb-sub { font-size: 0.8rem; color: var(--text2); }
  .fb-error { color: var(--red); font-weight: 600; }

  .spinner { width: 28px; height: 28px; border: 3px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin .75s linear infinite; margin: 0 auto 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Lista de produtos do inbound ── */
  .inbound-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-height: 70vh; overflow-y: auto; }
  .ip-title { font-size: 0.78rem; color: var(--text2); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .produto-item { padding: 12px; border-radius: 8px; margin-bottom: 8px; background: var(--bg); border: 1px solid var(--border); transition: all .2s; }
  .produto-item.completo { border-color: var(--green); background: rgba(63,185,80,.05); }
  .produto-item.parcial { border-color: var(--yellow); background: rgba(210,153,34,.05); }
  .pi-title { color: var(--white); font-weight: 600; font-size: 0.85rem; line-height: 1.3; margin-bottom: 6px; }
  .pi-meta { color: var(--text3); font-size: 0.72rem; font-family: 'Cascadia Code','Consolas',monospace; line-height: 1.4; }
  .pi-progress { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .pi-bar { flex: 1; height: 6px; background: var(--border2); border-radius: 3px; overflow: hidden; }
  .pi-bar-fill { height: 100%; transition: width .3s; }
  .pi-bar-fill.green { background: var(--green); }
  .pi-bar-fill.yellow { background: var(--yellow); }
  .pi-count { font-size: 0.78rem; font-weight: 700; color: var(--white); min-width: 70px; text-align: right; }
  .pi-count .done { color: var(--green); }
  .pi-count.over .done { color: var(--red); }

  kbd { background: var(--border2); padding: 2px 6px; border-radius: 4px; font-size: 0.72rem; color: var(--white); font-family: 'Cascadia Code',monospace; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-icon">B</div>
    <div>
      <h1>Bipar Etiquetas</h1>
      <div class="sub" id="header-sub">Carregue o PDF de inbound para começar</div>
    </div>
  </div>
  <div class="header-right">
    <span class="badge-inbound" id="badge-inbound" style="display:none"></span>
    <button class="btn btn-danger" id="btn-fechar" onclick="fecharInbound()" style="display:none">Fechar inbound</button>
    <a class="btn" href="/" style="text-decoration:none">← Dashboard</a>
  </div>
</header>

<div class="container">

  <!-- ESTADO 1: Upload do PDF -->
  <div id="upload-section">
    <div class="upload-area" id="drop-zone">
      <div class="upload-icon">📄</div>
      <div class="upload-title">Arraste o PDF do inbound</div>
      <div class="upload-sub">Ou clique para selecionar o arquivo de instruções de preparação do ML</div>
      <label class="btn btn-primary" for="file-input" style="cursor:pointer">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Selecionar PDF
      </label>
      <input type="file" id="file-input" class="upload-input" accept="application/pdf,.pdf" />
      <div id="upload-status" style="margin-top:18px;font-size:0.85rem;color:var(--text3)"></div>
    </div>
  </div>

  <!-- ESTADO 2: Bipagem -->
  <div id="working-section" style="display:none">
    <div class="grid">
      <div class="scan-area">
        <div class="scan-label">Bipa o EAN do produto</div>
        <input id="scan" class="scan-input" type="text" placeholder="Bipe ou digite o EAN e pressione Enter…" autocomplete="off" />

        <div class="config-row">
          <div class="config-item">
            <label for="qty">Linhas por bipagem (1 linha = 2 etiquetas):</label>
            <input id="qty" class="qty-input" type="number" min="1" max="500" value="1" />
          </div>
          <div class="config-item" style="color:var(--text3);font-size:0.78rem">
            Atalhos: <kbd>Esc</kbd> limpar &nbsp; <kbd>F2</kbd> foco no campo
          </div>
        </div>

        <div id="feedback" class="feedback idle">
          <div class="fb-content">Aguardando bipagem…</div>
        </div>
      </div>

      <div class="inbound-panel">
        <div class="ip-title">
          <span>Produtos do inbound</span>
          <span id="ip-summary" style="color:var(--text3);font-weight:400;font-size:0.7rem"></span>
        </div>
        <div id="produtos-list"></div>
      </div>
    </div>
  </div>

</div>

<script>
  // ── Estado ──────────────────────────────────────────────────────────────
  let inbound = null; // { inboundId, totalUnidades, produtos: [...] }
  let bipados = {}; // ean -> contagem de etiquetas impressas

  // ── Elementos ───────────────────────────────────────────────────────────
  const scanInput = document.getElementById('scan');
  const feedback = document.getElementById('feedback');
  const qtyInput = document.getElementById('qty');
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const uploadStatus = document.getElementById('upload-status');
  const headerSub = document.getElementById('header-sub');
  const badgeInbound = document.getElementById('badge-inbound');
  const btnFechar = document.getElementById('btn-fechar');
  const uploadSection = document.getElementById('upload-section');
  const workingSection = document.getElementById('working-section');
  const produtosList = document.getElementById('produtos-list');
  const ipSummary = document.getElementById('ip-summary');

  // Tenta restaurar do localStorage
  try {
    const saved = JSON.parse(localStorage.getItem('inbound_atual') || 'null');
    if (saved && saved.produtos) {
      inbound = saved;
      bipados = JSON.parse(localStorage.getItem('inbound_bipados') || '{}');
      mostrarTrabalho();
    }
  } catch {}

  // ── Upload do PDF ───────────────────────────────────────────────────────
  ['dragenter','dragover'].forEach(ev => {
    dropZone.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); dropZone.classList.add('drag'); });
  });
  ['dragleave','drop'].forEach(ev => {
    dropZone.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); dropZone.classList.remove('drag'); });
  });
  dropZone.addEventListener('drop', e => {
    const file = e.dataTransfer.files[0];
    if (file) processarArquivo(file);
  });
  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) processarArquivo(e.target.files[0]);
  });

  async function processarArquivo(file) {
    if (!/\.pdf$/i.test(file.name) && file.type !== 'application/pdf') {
      uploadStatus.textContent = '✗ Só arquivos PDF';
      uploadStatus.style.color = 'var(--red)';
      return;
    }
    uploadStatus.innerHTML = '<div class="spinner"></div>Processando PDF…';
    uploadStatus.style.color = 'var(--blue)';

    const fd = new FormData();
    fd.append('pdf', file);
    try {
      const r = await fetch('/api/inbound-parse', { method: 'POST', body: fd });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || 'Erro');

      inbound = d;
      bipados = {};
      localStorage.setItem('inbound_atual', JSON.stringify(inbound));
      localStorage.setItem('inbound_bipados', '{}');
      mostrarTrabalho();
    } catch (e) {
      uploadStatus.textContent = '✗ ' + e.message;
      uploadStatus.style.color = 'var(--red)';
    }
  }

  function mostrarTrabalho() {
    uploadSection.style.display = 'none';
    workingSection.style.display = 'block';
    headerSub.textContent = 'Bipa o EAN do produto e a etiqueta sai automaticamente';
    badgeInbound.style.display = 'inline-block';
    badgeInbound.textContent = `Inbound #${inbound.inboundId} · ${inbound.produtos.length} produto${inbound.produtos.length>1?'s':''} · ${inbound.totalUnidades} un`;
    btnFechar.style.display = 'inline-flex';
    renderProdutos();
    setTimeout(() => scanInput.focus(), 100);
  }

  function fecharInbound() {
    if (!confirm('Fechar este inbound? O progresso de bipagem será perdido.')) return;
    inbound = null;
    bipados = {};
    localStorage.removeItem('inbound_atual');
    localStorage.removeItem('inbound_bipados');
    uploadSection.style.display = 'block';
    workingSection.style.display = 'none';
    headerSub.textContent = 'Carregue o PDF de inbound para começar';
    badgeInbound.style.display = 'none';
    btnFechar.style.display = 'none';
    uploadStatus.textContent = '';
    fileInput.value = '';
  }

  // ── Renderiza lista de produtos com progresso ───────────────────────────
  function renderProdutos() {
    if (!inbound) return;
    const totalBipado = Object.values(bipados).reduce((a, b) => a + b, 0);
    ipSummary.textContent = `${totalBipado}/${inbound.totalUnidades} bipados`;

    produtosList.innerHTML = inbound.produtos.map(p => {
      const done = bipados[p.ean] || 0;
      const total = p.unidades || 0;
      const pct = total > 0 ? Math.min(100, (done / total) * 100) : 0;
      const completo = total > 0 && done >= total;
      const parcial = done > 0 && !completo;
      const over = total > 0 && done > total;
      return `<div class="produto-item ${completo?'completo':parcial?'parcial':''}">
        <div class="pi-title">${escapeHtml(p.title)}</div>
        <div class="pi-meta">EAN: ${escapeHtml(p.ean)} · SKU: ${escapeHtml(p.sku || '—')} · ${escapeHtml(p.inventoryId)}</div>
        <div class="pi-progress">
          <div class="pi-bar"><div class="pi-bar-fill ${completo?'green':'yellow'}" style="width:${pct.toFixed(1)}%"></div></div>
          <div class="pi-count ${over?'over':''}"><span class="done">${done}</span>/${total}</div>
        </div>
      </div>`;
    }).join('');
  }

  // ── Bipagem ──────────────────────────────────────────────────────────────
  scanInput.addEventListener('keydown', async (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const ean = scanInput.value.trim();
      if (!ean) return;
      await processarEAN(ean);
    } else if (e.key === 'Escape') {
      scanInput.value = '';
      scanInput.className = 'scan-input';
      mostrarFeedback('idle', 'Aguardando bipagem…');
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'F2') {
      e.preventDefault();
      scanInput.focus();
      scanInput.select();
    }
  });

  async function processarEAN(ean) {
    scanInput.className = 'scan-input';

    // Procura no inbound atual
    const produto = inbound.produtos.find(p => p.ean === ean);
    if (!produto) {
      scanInput.className = 'scan-input error';
      mostrarFeedback('error', `<div class="fb-icon">❌</div><div class="fb-title fb-error">EAN não está neste inbound</div><div class="fb-sub">EAN bipado: ${ean}</div>`);
      beep('error');
      setTimeout(() => { scanInput.value = ''; scanInput.focus(); }, 800);
      return;
    }

    const linhas = Math.max(1, parseInt(qtyInput.value) || 1);
    const etiquetas = linhas * 2;

    // Gera o ZPL no servidor e baixa o .txt automaticamente
    await baixarZpl(produto, linhas);

    // Atualiza contador (etiquetas individuais)
    bipados[ean] = (bipados[ean] || 0) + etiquetas;
    localStorage.setItem('inbound_bipados', JSON.stringify(bipados));
    renderProdutos();

    const done = bipados[ean];
    const total = produto.unidades || 0;
    const restante = Math.max(0, total - done);

    scanInput.className = 'scan-input success';
    mostrarFeedback('success',
      `<div class="fb-content">
        <div class="fb-icon">${done >= total ? '🎉' : '✓'}</div>
        <div class="fb-title">${escapeHtml(produto.title)}</div>
        <div class="fb-sub">${linhas} linha${linhas>1?'s':''} (${etiquetas} etiquetas) · ${done}/${total} bipados${restante>0 ? ` · faltam ${restante}` : ' · COMPLETO!'}</div>
      </div>`
    );
    beep('success');

    setTimeout(() => {
      scanInput.value = '';
      scanInput.focus();
    }, 600);
  }

  function mostrarFeedback(tipo, html) {
    feedback.className = 'feedback ' + tipo;
    feedback.innerHTML = '<div class="fb-content">' + html + '</div>';
  }

  // ── Geração do arquivo ZPL (formato ML) e download ───────────────────────
  async function baixarZpl(produto, linhas) {
    const r = await fetch('/api/generate-zpl', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        inventoryId: produto.inventoryId,
        title: produto.title,
        sku: produto.sku,
        linhas,
      }),
    });
    if (!r.ok) {
      const e = await r.json().catch(() => ({}));
      throw new Error(e.error || 'Falha ao gerar ZPL');
    }
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Etiquetas-${produto.inventoryId}.zpl`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function escapeHtml(s) {
    return String(s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  // ── Bip sonoro ──────────────────────────────────────────────────────────
  function beep(tipo) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = tipo === 'success' ? 880 : 220;
      gain.gain.value = 0.05;
      osc.start();
      setTimeout(() => { osc.stop(); ctx.close(); }, tipo === 'success' ? 100 : 250);
    } catch {}
  }

  // Foco automático
  document.addEventListener('click', (e) => {
    if (workingSection.style.display === 'none') return;
    if (!e.target.closest('button') && !e.target.closest('input') && !e.target.closest('a') && !e.target.closest('label')) {
      scanInput.focus();
    }
  });
</script>
</body>
</html>
